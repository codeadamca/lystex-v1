<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYST Player Launcher</title>
<style>
:root {
  --bg: #000000;
  --panel: rgba(14, 14, 14, 0.84);
  --panel-border: #db88c0;
  --ink: #f4d8e9;
  --muted: #d1a7c4;
  --accent-pink: #db88c0;
  --accent-lilac: #9f7fd2;
  --accent-cyan: #4fc4db;
  --shadow: rgba(219, 136, 192, 0.24);
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: monospace;
  display: flex;
  align-items: center;
  justify-content: center;
}

.panel {
  width: min(460px, calc(100vw - 32px));
  padding: 28px;
  border: 4px solid var(--panel-border);
  background: var(--panel);
  box-shadow: 0 20px 50px var(--shadow);
  text-align: center;
}

h1 {
  margin: 0 0 10px;
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: var(--ink);
}

p {
  margin: 0 0 24px;
  line-height: 1.6;
  color: var(--muted);
}

.actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

a {
  display: block;
  padding: 14px 18px;
  border: 1px solid rgba(63, 69, 70, 0.26);
  background: var(--accent-lilac);
  color: #f8f3e3;
  text-decoration: none;
  box-shadow: 0 10px 22px rgba(79, 83, 84, 0.18);
}

a:hover {
  filter: brightness(1.04);
}

@media (max-width: 560px) {
  .actions {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="panel">
  <h1>LYST Launcher</h1>
  <p>Choose the display screen or the remote control.</p>
  <div class="actions">
    <a href="player.html">Player</a>
    <a href="control.html">Control</a>
  </div>
</div>

</body>
</html>
