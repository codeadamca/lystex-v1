<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYST Player Launcher</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #0b1830 0%, #04060d 55%, #010203 100%);
  color: #00eaff;
  font-family: monospace;
  display: flex;
  align-items: center;
  justify-content: center;
}

.panel {
  width: min(460px, calc(100vw - 32px));
  padding: 28px;
  border: 1px solid rgba(0, 234, 255, 0.35);
  background: rgba(0, 7, 15, 0.82);
  box-shadow: 0 0 40px rgba(0, 234, 255, 0.12);
  text-align: center;
}

h1 {
  margin: 0 0 10px;
  font-size: 1.8rem;
  letter-spacing: 2px;
}

p {
  margin: 0 0 24px;
  line-height: 1.6;
}

.actions {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

a {
  display: block;
  padding: 14px 18px;
  border: 1px solid #00eaff;
  background: rgba(0, 0, 0, 0.65);
  color: #00eaff;
  text-decoration: none;
}

a:hover {
  background: rgba(0, 234, 255, 0.12);
}

@media (max-width: 560px) {
  .actions {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<div class="panel">
  <h1>LYST Launcher</h1>
  <p>Choose the display screen or the remote control.</p>
  <div class="actions">
    <a href="player.html">Player</a>
    <a href="control.html">Control</a>
  </div>
</div>

</body>
</html>
