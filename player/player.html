<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Control Countdown</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="player-page">

<div id="screen">
  <div id="timer">07:00</div>
</div>

<div id="audioUnlock">
  <button id="audioUnlockButton" type="button">Tap Once To Enable Audio</button>
</div>

<div id="videoOverlay">
  <video id="videoPlayer" playsinline preload="auto"></video>
</div>

<script type="module">
import { db, ref, onValue, set, update, onDisconnect, serverTimestamp } from "./firebase-config.js";

let totalSeconds = 7 * 60;
let countdownInterval;
let videoPlaying = false;
let audioUnlocked = false;
let lastProcessedNonce = 0;
const commandRef = ref(db, "remote/command");
const presenceRef = ref(db, "remote/presence");

const videoLibrary = {
  "game-over": "videos/game-over.mp4",
  symbols: "videos/symbols.mp4",
  gate: "videos/gate.mp4",
  listen: "videos/listen.mp4",
  "purple-pink": "videos/purple-pink.mp4",
  win: "videos/win.mp4"
};

// Start the countdown
function startCountdown() {
  if (countdownInterval) {
    return;
  }

  countdownInterval = setInterval(() => {
    if (totalSeconds > 0) {
      totalSeconds--;
      updateDisplay();
      return;
    }

    stopCountdown();
  }, 1000);
}

function stopCountdown() {
  if (!countdownInterval) {
    return;
  }

  clearInterval(countdownInterval);
  countdownInterval = undefined;
}

// Update the timer display
function updateDisplay() {
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

// Reset the countdown
function resetTimer() {
	stopCountdown();
  totalSeconds = 7 * 60;
  updateDisplay();
}

function hideAudioUnlock() {
  document.getElementById("audioUnlock").hidden = true;
}

function enableAudio() {
  audioUnlocked = true;

  const video = document.getElementById("videoPlayer");
  video.muted = false;

  if (videoPlaying) {
    video.play().catch(() => {
      return undefined;
    });
  }

  hideAudioUnlock();
}

function playNamedVideo(name) {
  const filename = videoLibrary[name];

  if (!filename) {
    return;
  }

  playVideo(filename);
}

function stopCurrentVideo() {
  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.removeAttribute("src");
  video.load();
  overlay.style.display = "none";
  videoPlaying = false;
}

// Play a video overlay
function playVideo(filename) {
  videoPlaying = true;

  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  // Interrupt the current video immediately when a new command arrives.
  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.muted = !audioUnlocked;
  video.src = filename;
  overlay.style.display = "flex";

  const playAttempt = video.play();

  if (playAttempt && typeof playAttempt.catch === "function") {
    playAttempt.catch(() => {
      // Fall back to muted autoplay until the display page has been tapped once.
      video.muted = true;
      video.play().catch(() => {
        overlay.style.display = "none";
        videoPlaying = false;
      });
    });
  }

  video.onended = () => {
    overlay.style.display = "none";
    videoPlaying = false;
  };
}

function updateRemoteStatus(message) {
	document.body.dataset.remoteStatus = message || "Waiting for controller";
  return document.body.dataset.remoteStatus;
}

function setupRemoteChannel() {
  set(presenceRef, {
    playerReady: true,
    updatedAt: serverTimestamp()
  }).catch(() => {
    updateRemoteStatus("Remote control unavailable");
  });

  onDisconnect(presenceRef).update({
    playerReady: false,
    updatedAt: serverTimestamp()
  });

  onValue(commandRef, (snapshot) => {
    const command = snapshot.val();

    if (!command || typeof command !== "object") {
      return;
    }

    if (typeof command.nonce !== "number" || command.nonce <= lastProcessedNonce) {
      return;
    }

    lastProcessedNonce = command.nonce;
    handleRemoteCommand(command);
    updateRemoteStatus("Connected to controller");
  }, () => {
    updateRemoteStatus("Remote control unavailable");
  });
}

function handleRemoteCommand(command) {
  if (!command || typeof command !== "object") {
    return;
  }

  if (command.type === "play") {
    playNamedVideo(command.video);
  }

  if (command.type === "reset") {
    resetTimer();
  }

	if (command.type === "start") {
		startCountdown();
	}

  if (command.type === "stop") {
    stopCurrentVideo();
  }
}

function setupRemotePlayback() {
	setupRemoteChannel();
}

window.addEventListener("beforeunload", () => {
  update(presenceRef, {
		playerReady: false,
		updatedAt: serverTimestamp()
	}).catch(() => {
		return undefined;
	});
}, { once: true });

// Initialize
updateDisplay();
updateRemoteStatus();
setupRemotePlayback();
document.getElementById("audioUnlockButton").addEventListener("click", enableAudio);
</script>

</body>
</html>
