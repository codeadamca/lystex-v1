<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Control Countdown</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="player-page">

<div id="screen">
  <div id="timer">07:00</div>
</div>

<div id="audioUnlock">
  <button id="audioUnlockButton" type="button">Tap Once To Enable Audio</button>
</div>

<div id="videoOverlay">
  <video id="videoPlayer" playsinline preload="auto"></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let totalSeconds = 7 * 60;
let countdownInterval;
let videoPlaying = false;
let peer;
let controllerConnection;
let audioUnlocked = false;
const remoteChannelId = "lystex-main-controller";
const peerOptions = {
  host: "0.peerjs.com",
  secure: true,
  port: 443,
  path: "/"
};

const videoLibrary = {
  "game-over": "videos/game-over.mp4",
  symbols: "videos/symbols.mp4",
  gate: "videos/gate.mp4",
  listen: "videos/listen.mp4",
  "purple-pink": "videos/purple-pink.mp4",
  win: "videos/win.mp4"
};

// Start the countdown
function startCountdown() {
  countdownInterval = setInterval(() => {
    if (totalSeconds > 0) {
      totalSeconds--;
      updateDisplay();
    }
  }, 1000);
}

// Update the timer display
function updateDisplay() {
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

// Reset the countdown
function resetTimer() {
  totalSeconds = 7 * 60;
  updateDisplay();
}

function hideAudioUnlock() {
  document.getElementById("audioUnlock").hidden = true;
}

function enableAudio() {
  audioUnlocked = true;

  const video = document.getElementById("videoPlayer");
  video.muted = false;

  if (videoPlaying) {
    video.play().catch(() => {
      return undefined;
    });
  }

  hideAudioUnlock();
}

function playNamedVideo(name) {
  const filename = videoLibrary[name];

  if (!filename) {
    return;
  }

  playVideo(filename);
}

function stopCurrentVideo() {
  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.removeAttribute("src");
  video.load();
  overlay.style.display = "none";
  videoPlaying = false;
}

// Play a video overlay
function playVideo(filename) {
  videoPlaying = true;

  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  // Interrupt the current video immediately when a new command arrives.
  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.muted = !audioUnlocked;
  video.src = filename;
  overlay.style.display = "flex";

  const playAttempt = video.play();

  if (playAttempt && typeof playAttempt.catch === "function") {
    playAttempt.catch(() => {
      // Fall back to muted autoplay until the display page has been tapped once.
      video.muted = true;
      video.play().catch(() => {
        overlay.style.display = "none";
        videoPlaying = false;
      });
    });
  }

  video.onended = () => {
    overlay.style.display = "none";
    videoPlaying = false;
  };
}

function updateRemoteStatus(message) {
  return message || "Waiting for controller";
}

function createDisplayPeer() {
  if (peer) {
    peer.destroy();
  }

  peer = new Peer(undefined, peerOptions);

  peer.on("open", () => {
    updateRemoteStatus("Connecting to controller");

    if (controllerConnection) {
      controllerConnection.close();
    }

    controllerConnection = peer.connect(remoteChannelId, { reliable: true });

    controllerConnection.on("open", () => {
      updateRemoteStatus("Connected to controller");
    });

    controllerConnection.on("data", handleRemoteCommand);

    controllerConnection.on("close", () => {
      updateRemoteStatus("Controller disconnected");
      window.setTimeout(createDisplayPeer, 1500);
    });

    controllerConnection.on("error", () => {
      updateRemoteStatus("Controller unavailable");
      window.setTimeout(createDisplayPeer, 1500);
    });
  });

  peer.on("disconnected", () => {
    updateRemoteStatus("Reconnecting to controller");
    window.setTimeout(createDisplayPeer, 1500);
  });

  peer.on("error", (error) => {
    const shouldRetry = error && (
      error.type === "network" ||
      error.type === "server-error" ||
      error.type === "socket-error" ||
      error.type === "socket-closed" ||
      error.type === "unavailable-id"
    );

    updateRemoteStatus("Controller unavailable");

    if (shouldRetry) {
      window.setTimeout(createDisplayPeer, 1500);
    }
  });
}

function handleRemoteCommand(command) {
  if (!command || typeof command !== "object") {
    return;
  }

  if (command.type === "play") {
    playNamedVideo(command.video);
  }

  if (command.type === "reset") {
    resetTimer();
  }

  if (command.type === "stop") {
    stopCurrentVideo();
  }
}

function setupRemotePlayback() {
  if (typeof Peer === "undefined") {
    updateRemoteStatus("Remote control unavailable");
    return;
  }

  createDisplayPeer();
}

// Initialize
updateDisplay();
updateRemoteStatus();
startCountdown();
setupRemotePlayback();
document.getElementById("audioUnlockButton").addEventListener("click", enableAudio);
</script>

</body>
</html>
