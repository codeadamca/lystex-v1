<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Control Countdown</title>
<style>
:root {
  color-scheme: dark;
  --bg: #000000;
  --timer: #9f7fd2;
  --timer-accent: #db88c0;
  --timer-shadow: rgba(47, 54, 55, 0.32);
  --overlay: rgba(31, 35, 36, 0.82);
  --panel: rgba(244, 237, 213, 0.92);
  --panel-border: rgba(63, 69, 70, 0.28);
  --panel-text: #353c3d;
  --panel-accent: #db88c0;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--timer);
  font-family: monospace;
  overflow: hidden;
}

#screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

#timer {
  font-size: clamp(8rem, 18vw, 16rem);
  background: linear-gradient(180deg, var(--timer-accent) 0%, var(--timer) 55%, #c5b0eb 100%);
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 28px var(--timer-shadow);
}

#audioUnlock {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: var(--overlay);
  z-index: 20;
}

#audioUnlock[hidden] {
  display: none;
}

#audioUnlock button {
  border: 1px solid var(--panel-border);
  background: var(--panel);
  color: var(--panel-text);
  font: inherit;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  padding: 18px 24px;
  cursor: pointer;
  box-shadow: 0 20px 50px rgba(39, 44, 45, 0.28);
}

#videoOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #111415;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}
</style>
</head>

<body>

<div id="screen">
  <div id="timer">07:00</div>
</div>

<div id="audioUnlock">
  <button id="audioUnlockButton" type="button">Tap Once To Enable Audio</button>
</div>

<div id="videoOverlay">
  <video id="videoPlayer" playsinline preload="auto"></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let totalSeconds = 7 * 60;
let countdownInterval;
let videoPlaying = false;
let peer;
let audioUnlocked = false;
const remoteChannelId = "lystex-main-display";
const peerOptions = {
  host: "0.peerjs.com",
  secure: true,
  port: 443,
  path: "/"
};

const videoLibrary = {
  intro: "videos/intro.mp4",
  goodbye: "videos/goodbye.mp4",
  symbols: "videos/symbols.mp4",
  gate: "videos/gate.mp4"
};

// Start the countdown
function startCountdown() {
  countdownInterval = setInterval(() => {
    if (totalSeconds > 0) {
      totalSeconds--;
      updateDisplay();
    }
  }, 1000);
}

// Update the timer display
function updateDisplay() {
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

// Reset the countdown
function resetTimer() {
  totalSeconds = 7 * 60;
  updateDisplay();
}

function hideAudioUnlock() {
  document.getElementById("audioUnlock").hidden = true;
}

function enableAudio() {
  audioUnlocked = true;

  const video = document.getElementById("videoPlayer");
  video.muted = false;

  if (videoPlaying) {
    video.play().catch(() => {
      return undefined;
    });
  }

  hideAudioUnlock();
}

function playNamedVideo(name) {
  const filename = videoLibrary[name];

  if (!filename) {
    return;
  }

  playVideo(filename);
}

function stopCurrentVideo() {
  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.removeAttribute("src");
  video.load();
  overlay.style.display = "none";
  videoPlaying = false;
}

// Play a video overlay
function playVideo(filename) {
  videoPlaying = true;

  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  // Interrupt the current video immediately when a new command arrives.
  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.muted = !audioUnlocked;
  video.src = filename;
  overlay.style.display = "flex";

  const playAttempt = video.play();

  if (playAttempt && typeof playAttempt.catch === "function") {
    playAttempt.catch(() => {
      // Fall back to muted autoplay until the display page has been tapped once.
      video.muted = true;
      video.play().catch(() => {
        overlay.style.display = "none";
        videoPlaying = false;
      });
    });
  }

  video.onended = () => {
    overlay.style.display = "none";
    videoPlaying = false;
  };
}

function updateRemoteStatus(message) {
  return message || "Waiting for controller";
}

function createDisplayPeer() {
  if (peer) {
    peer.destroy();
  }

  peer = new Peer(remoteChannelId, peerOptions);

  peer.on("open", () => {
    updateRemoteStatus("Remote control ready");
  });

  peer.on("connection", (connection) => {
    updateRemoteStatus("Controller connected");

    connection.on("data", handleRemoteCommand);
    connection.on("close", () => {
      updateRemoteStatus("Controller disconnected");
    });
  });

  peer.on("disconnected", () => {
    updateRemoteStatus("Remote control reconnecting");
    peer.reconnect();
  });

  peer.on("error", (error) => {
    const shouldRetry = error && (
      error.type === "network" ||
      error.type === "server-error" ||
      error.type === "socket-error" ||
      error.type === "socket-closed" ||
      error.type === "unavailable-id"
    );

    updateRemoteStatus("Remote control unavailable");

    if (shouldRetry) {
      window.setTimeout(createDisplayPeer, 1500);
    }
  });
}

function handleRemoteCommand(command) {
  if (!command || typeof command !== "object") {
    return;
  }

  if (command.type === "play") {
    playNamedVideo(command.video);
  }

  if (command.type === "reset") {
    resetTimer();
  }

  if (command.type === "stop") {
    stopCurrentVideo();
  }
}

function setupRemotePlayback() {
  if (typeof Peer === "undefined") {
    updateRemoteStatus("Remote control unavailable");
    return;
  }

  createDisplayPeer();
}

// Initialize
updateDisplay();
updateRemoteStatus();
startCountdown();
setupRemotePlayback();
document.getElementById("audioUnlockButton").addEventListener("click", enableAudio);
</script>

</body>
</html>
