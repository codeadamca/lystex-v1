<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Control Countdown</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="player-page">

<div id="screen">
  <div id="timer">07:00</div>
</div>

<div id="audioUnlock">
  <button id="audioUnlockButton" type="button">Tap Once To Enable Audio</button>
</div>

<div id="videoOverlay">
  <video id="videoPlayer" playsinline preload="auto"></video>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let totalSeconds = 7 * 60;
let countdownInterval;
let videoPlaying = false;
let peer;
let controllerConnection;
let audioUnlocked = false;
const playerChannelId = "lystex-main-player";
const localChannelName = "lystex-player-control";
let localChannel;
let retryDelayMs = 2000;
const initialRetryDelayMs = 2000;
const maxRetryDelayMs = 30000;

const videoLibrary = {
  "game-over": "videos/game-over.mp4",
  symbols: "videos/symbols.mp4",
  gate: "videos/gate.mp4",
  listen: "videos/listen.mp4",
  "purple-pink": "videos/purple-pink.mp4",
  win: "videos/win.mp4"
};

// Start the countdown
function startCountdown() {
  if (countdownInterval) {
    return;
  }

  countdownInterval = setInterval(() => {
    if (totalSeconds > 0) {
      totalSeconds--;
      updateDisplay();
      return;
    }

    stopCountdown();
  }, 1000);
}

function stopCountdown() {
  if (!countdownInterval) {
    return;
  }

  clearInterval(countdownInterval);
  countdownInterval = undefined;
}

// Update the timer display
function updateDisplay() {
  const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
  const seconds = String(totalSeconds % 60).padStart(2, '0');
  document.getElementById("timer").textContent = `${minutes}:${seconds}`;
}

// Reset the countdown
function resetTimer() {
	stopCountdown();
  totalSeconds = 7 * 60;
  updateDisplay();
}

function hideAudioUnlock() {
  document.getElementById("audioUnlock").hidden = true;
}

function enableAudio() {
  audioUnlocked = true;

  const video = document.getElementById("videoPlayer");
  video.muted = false;

  if (videoPlaying) {
    video.play().catch(() => {
      return undefined;
    });
  }

  hideAudioUnlock();
}

function playNamedVideo(name) {
  const filename = videoLibrary[name];

  if (!filename) {
    return;
  }

  playVideo(filename);
}

function stopCurrentVideo() {
  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.removeAttribute("src");
  video.load();
  overlay.style.display = "none";
  videoPlaying = false;
}

// Play a video overlay
function playVideo(filename) {
  videoPlaying = true;

  const overlay = document.getElementById("videoOverlay");
  const video = document.getElementById("videoPlayer");

  // Interrupt the current video immediately when a new command arrives.
  video.pause();
  video.onended = null;
  video.currentTime = 0;
  video.muted = !audioUnlocked;
  video.src = filename;
  overlay.style.display = "flex";

  const playAttempt = video.play();

  if (playAttempt && typeof playAttempt.catch === "function") {
    playAttempt.catch(() => {
      // Fall back to muted autoplay until the display page has been tapped once.
      video.muted = true;
      video.play().catch(() => {
        overlay.style.display = "none";
        videoPlaying = false;
      });
    });
  }

  video.onended = () => {
    overlay.style.display = "none";
    videoPlaying = false;
  };
}

function updateRemoteStatus(message) {
  return message || "Waiting for controller";
}

function resetRetryDelay() {
  retryDelayMs = initialRetryDelayMs;
}

function increaseRetryDelay() {
  retryDelayMs = Math.min(retryDelayMs * 2, maxRetryDelayMs);
}

function schedulePeerRetry() {
  const delay = retryDelayMs;
  increaseRetryDelay();
  window.setTimeout(createDisplayPeer, delay);
}

function announceLocalReady() {
  if (!localChannel) {
    return;
  }

  localChannel.postMessage({ type: "player-ready" });
}

function createDisplayPeer() {
  if (peer) {
    peer.destroy();
  }

  peer = new Peer(playerChannelId);

  peer.on("open", () => {
    updateRemoteStatus("Waiting for controller");
    resetRetryDelay();
    announceLocalReady();
  });

  peer.on("connection", (connection) => {
    if (controllerConnection && controllerConnection !== connection) {
      controllerConnection.close();
    }

    controllerConnection = connection;
    updateRemoteStatus("Controller connected");

    connection.on("data", handleRemoteCommand);

    connection.on("close", () => {
      if (controllerConnection === connection) {
        controllerConnection = undefined;
      }

      updateRemoteStatus("Waiting for controller");
    });

    connection.on("error", () => {
      if (controllerConnection === connection) {
        controllerConnection = undefined;
      }

      updateRemoteStatus("Controller unavailable");
    });
  });

  peer.on("disconnected", () => {
    updateRemoteStatus("Reconnecting to controller");
    schedulePeerRetry();
  });

  peer.on("error", (error) => {
    const shouldRetry = error && (
      error.type === "network" ||
      error.type === "server-error" ||
      error.type === "socket-error" ||
      error.type === "socket-closed" ||
      error.type === "unavailable-id"
    );

    updateRemoteStatus("Controller unavailable");

    if (shouldRetry) {
      schedulePeerRetry();
    }
  });
}

function handleRemoteCommand(command) {
  if (!command || typeof command !== "object") {
    return;
  }

  if (command.type === "play") {
    playNamedVideo(command.video);
  }

  if (command.type === "reset") {
    resetTimer();
  }

	if (command.type === "start") {
		startCountdown();
	}

  if (command.type === "stop") {
    stopCurrentVideo();
  }
}

function setupRemotePlayback() {
  if (typeof Peer === "undefined") {
    updateRemoteStatus("Remote control unavailable");
  } else {
    createDisplayPeer();
  }

  if (typeof BroadcastChannel !== "undefined") {
    localChannel = new BroadcastChannel(localChannelName);
    localChannel.onmessage = (event) => {
      const command = event.data;

      if (!command || typeof command !== "object") {
        return;
      }

      if (command.type === "controller-ready") {
        announceLocalReady();
        return;
      }

      handleRemoteCommand(command);
    };

    announceLocalReady();
    window.addEventListener("beforeunload", () => {
      localChannel.postMessage({ type: "player-gone" });
      localChannel.close();
    }, { once: true });
  }
}

// Initialize
updateDisplay();
updateRemoteStatus();
setupRemotePlayback();
document.getElementById("audioUnlockButton").addEventListener("click", enableAudio);
</script>

</body>
</html>
