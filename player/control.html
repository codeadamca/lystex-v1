<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Control Remote</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="control-page">

<div class="panel">
	<h1>Remote Playback</h1>

	<div id="status">Connecting to display...</div>

	<div class="buttonSection">
		<div class="buttonGrid">
			<button class="remoteButton" onclick="sendCommand('listen')" disabled>Listen</button>
			<button class="remoteButton" onclick="sendCommand('purple-pink')" disabled>Purple Pink</button>
			<button class="remoteButton" onclick="sendCommand('symbols')" disabled>Symbols</button>
			<button class="remoteButton" onclick="sendCommand('gate')" disabled>Gate</button>
			<button class="remoteButton" onclick="sendCommand('game-over')" disabled>Game Over</button>
			<button class="remoteButton" onclick="sendCommand('win')" disabled>Win</button>
		</div>

		<div class="controlActions">
			<button class="remoteButton" onclick="stopVideo()" disabled>Stop Video</button>
			<button class="remoteButton" onclick="startTimer()" disabled>Start Timer</button>
			<button class="remoteButton" onclick="resetTimer()" disabled>Reset Timer</button>
		</div>
	</div>
</div>

<script type="module">
import { db, ref, onValue, set, serverTimestamp } from "./firebase-config.js";

let remotePlayerReady = false;
const commandRef = ref(db, "remote/command");
const presenceRef = ref(db, "remote/presence");

function hasAnyConnection() {
	return remotePlayerReady;
}

function setStatus(message) {
	document.getElementById("status").textContent = message;
}

function setButtonsEnabled(enabled) {
	document.querySelectorAll(".remoteButton").forEach((button) => {
		button.disabled = !enabled;
	});
}

function updateConnectedStatus() {
	if (!remotePlayerReady) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return;
	}

	setStatus("Connected to remote player.");
	setButtonsEnabled(true);
}

function broadcastCommand(command) {
	if (remotePlayerReady) {
		set(commandRef, {
			...command,
			nonce: Date.now(),
			updatedAt: serverTimestamp()
		}).catch(() => {
			setStatus("Remote command failed.");
			setButtonsEnabled(false);
		});
	}

	if (!hasAnyConnection()) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return false;
	}

	updateConnectedStatus();
	return true;
}

function setupRemoteChannel() {
	onValue(presenceRef, (snapshot) => {
		const data = snapshot.val();
		remotePlayerReady = Boolean(data && data.playerReady);
		updateConnectedStatus();
	}, () => {
		remotePlayerReady = false;
		setStatus("Remote status unavailable.");
		setButtonsEnabled(false);
	});
}

function formatVideoName(videoName) {
	return videoName
		.split("-")
		.map((part) => part.charAt(0).toUpperCase() + part.slice(1))
		.join(" ");
}

function sendCommand(videoName) {
	if (!broadcastCommand({ type: "play", video: videoName })) {
		return;
	}

	setStatus(`Sent ${formatVideoName(videoName)} to all players.`);
}

function resetTimer() {
	if (!broadcastCommand({ type: "reset" })) {
		return;
	}

	setStatus("Sent reset to all players.");
}

function startTimer() {
	if (!broadcastCommand({ type: "start" })) {
		return;
	}

	setStatus("Sent start timer to all players.");
}

function stopVideo() {
	if (!broadcastCommand({ type: "stop" })) {
		return;
	}

	setStatus("Sent stop to all players.");
}

window.sendCommand = sendCommand;
window.resetTimer = resetTimer;
window.startTimer = startTimer;
window.stopVideo = stopVideo;

setupRemoteChannel();
</script>

</body>
</html>
