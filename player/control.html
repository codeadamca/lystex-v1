<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Control Remote</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="control-page">

<div class="panel">
	<h1>Remote Playback</h1>

	<div id="status">Connecting to display...</div>

	<div class="buttonSection">
		<div class="buttonGrid">
			<button class="remoteButton" onclick="sendCommand('listen')" disabled>Listen</button>
			<button class="remoteButton" onclick="sendCommand('purple-pink')" disabled>Purple Pink</button>
			<button class="remoteButton" onclick="sendCommand('symbols')" disabled>Symbols</button>
			<button class="remoteButton" onclick="sendCommand('gate')" disabled>Gate</button>
			<button class="remoteButton" onclick="sendCommand('game-over')" disabled>Game Over</button>
			<button class="remoteButton" onclick="sendCommand('win')" disabled>Win</button>
		</div>

		<div class="controlActions">
			<button class="remoteButton" onclick="stopVideo()" disabled>Stop Video</button>
			<button class="remoteButton" onclick="startTimer()" disabled>Start Timer</button>
			<button class="remoteButton" onclick="resetTimer()" disabled>Reset Timer</button>
		</div>
	</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let peer;
let playerConnections = [];
const remoteChannelId = "lystex-main-controller";
const peerOptions = {
	host: "0.peerjs.com",
	secure: true,
	port: 443,
	path: "/"
};
const localChannelName = "lystex-player-control";
let reconnectTimer;
let localChannel;
let localPlayerReady = false;
let retryDelayMs = 3000;
const initialRetryDelayMs = 3000;
const maxRetryDelayMs = 30000;

function hasAnyConnection() {
	const activeConnections = playerConnections.filter((item) => item.open);
	return localPlayerReady || activeConnections.length > 0;
}

function resetRetryDelay() {
	retryDelayMs = initialRetryDelayMs;
}

function increaseRetryDelay() {
	retryDelayMs = Math.min(retryDelayMs * 2, maxRetryDelayMs);
}

function setStatus(message) {
	document.getElementById("status").textContent = message;
}

function setButtonsEnabled(enabled) {
	document.querySelectorAll(".remoteButton").forEach((button) => {
		button.disabled = !enabled;
	});
}

function updateConnectedStatus() {
	if (localPlayerReady) {
		resetRetryDelay();
		setStatus("Connected to local player.");
		setButtonsEnabled(true);
		return;
	}

	const activeConnections = playerConnections.filter((item) => item.open);
	const count = activeConnections.length;

	if (count === 0) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return;
	}

	setStatus(`Connected to ${count} player${count === 1 ? "" : "s"}.`);
	resetRetryDelay();
	setButtonsEnabled(true);
}

function buildPeer() {
	if (peer) {
		return peer;
	}

	peer = new Peer(remoteChannelId, peerOptions);
	peer.on("open", () => {
		updateConnectedStatus();
	});
	peer.on("connection", (connection) => {
		playerConnections.push(connection);
		updateConnectedStatus();

		connection.on("open", () => {
			updateConnectedStatus();
		});

		connection.on("close", () => {
			playerConnections = playerConnections.filter((item) => item !== connection);
			updateConnectedStatus();
		});

		connection.on("error", () => {
			playerConnections = playerConnections.filter((item) => item !== connection);
			updateConnectedStatus();
		});
	});
	peer.on("disconnected", () => {
		peer = undefined;
		playerConnections = [];
		if (!localPlayerReady) {
			setStatus("Reconnecting controller...");
			setButtonsEnabled(false);
		}
		scheduleReconnect();
	});
	peer.on("error", (error) => {
		if (peer) {
			peer.destroy();
			peer = undefined;
		}
		playerConnections = [];
		const errorLabel = error && error.type ? error.type : "unknown error";
		if (!localPlayerReady) {
			setStatus(`Controller failed (${errorLabel}). Retrying...`);
			setButtonsEnabled(false);
		}
		scheduleReconnect();
	});
	return peer;
}

function scheduleReconnect() {
	window.clearTimeout(reconnectTimer);
	const delay = retryDelayMs;
	increaseRetryDelay();
	reconnectTimer = window.setTimeout(() => {
		reconnectTimer = undefined;

		if (localPlayerReady) {
			return;
		}

		playerConnections.forEach((connection) => {
			connection.close();
		});
		playerConnections = [];

		if (peer) {
			peer.destroy();
			peer = undefined;
		}

		buildPeer();
	}, delay);
}

function broadcastCommand(command) {
	if (localPlayerReady && localChannel) {
		localChannel.postMessage(command);
	}

	const activeConnections = playerConnections.filter((item) => item.open);
	activeConnections.forEach((connection) => {
		connection.send(command);
	});

	if (!hasAnyConnection()) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return false;
	}

	updateConnectedStatus();
	return true;
}

function setupLocalChannel() {
	if (typeof BroadcastChannel === "undefined") {
		return;
	}

	localChannel = new BroadcastChannel(localChannelName);
	localChannel.onmessage = (event) => {
		const message = event.data;

		if (!message || typeof message !== "object") {
			return;
		}

		if (message.type === "player-ready") {
			localPlayerReady = true;
			updateConnectedStatus();
		}

		if (message.type === "player-gone") {
			localPlayerReady = false;
			if (playerConnections.filter((item) => item.open).length === 0) {
				setStatus("Waiting for players...");
				setButtonsEnabled(false);
			}
		}
	};

	localChannel.postMessage({ type: "controller-ready" });
}

function formatVideoName(videoName) {
	return videoName
		.split("-")
		.map((part) => part.charAt(0).toUpperCase() + part.slice(1))
		.join(" ");
}

function sendCommand(videoName) {
	if (!broadcastCommand({ type: "play", video: videoName })) {
		return;
	}

	setStatus(`Sent ${formatVideoName(videoName)} to all players.`);
}

function resetTimer() {
	if (!broadcastCommand({ type: "reset" })) {
		return;
	}

	setStatus("Sent reset to all players.");
}

function startTimer() {
	if (!broadcastCommand({ type: "start" })) {
		return;
	}

	setStatus("Sent start timer to all players.");
}

function stopVideo() {
	if (!broadcastCommand({ type: "stop" })) {
		return;
	}

	setStatus("Sent stop to all players.");
}

setupLocalChannel();
buildPeer();
</script>

</body>
</html>
