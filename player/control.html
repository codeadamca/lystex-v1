<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Control Remote</title>
<style>
body {
	margin: 0;
	min-height: 100vh;
	background: radial-gradient(circle at top, #0b1830 0%, #04060d 55%, #010203 100%);
	color: #00eaff;
	font-family: monospace;
	display: flex;
	align-items: center;
	justify-content: center;
}

.panel {
	width: min(520px, calc(100vw - 32px));
	border: 1px solid rgba(0, 234, 255, 0.35);
	background: rgba(0, 7, 15, 0.82);
	box-shadow: 0 0 40px rgba(0, 234, 255, 0.12);
	padding: 24px;
}

h1 {
	margin: 0 0 8px;
	font-size: 1.8rem;
	letter-spacing: 2px;
}

p {
	margin: 0 0 18px;
	line-height: 1.5;
}

button {
	padding: 12px 16px;
	border: 1px solid #00eaff;
	background: rgba(0, 0, 0, 0.65);
	color: #00eaff;
	font: inherit;
	cursor: pointer;
}

button:hover:enabled {
	background: rgba(0, 234, 255, 0.12);
}

button:disabled {
	opacity: 0.45;
	cursor: not-allowed;
}

.buttonGrid {
	display: grid;
	grid-template-columns: repeat(2, minmax(0, 1fr));
	gap: 12px;
}

#status {
	margin-bottom: 16px;
	min-height: 24px;
}

@media (max-width: 560px) {
	.buttonGrid {
		grid-template-columns: 1fr;
		display: grid;
	}
}
</style>
</head>
<body>

<div class="panel">
	<h1>Remote Playback</h1>
	<p>This controller connects automatically to the main display and uses the same four controls as the player.</p>

	<div id="status">Connecting to display...</div>

	<div class="buttonGrid">
		<button class="remoteButton" onclick="sendCommand('intro')" disabled>Control Intro</button>
		<button class="remoteButton" onclick="sendCommand('goodbye')" disabled>Control Goodbye</button>
		<button class="remoteButton" onclick="sendCommand('symbols')" disabled>Control Symbols</button>
		<button class="remoteButton" onclick="sendCommand('gate')" disabled>Control Gate</button>
		<button class="remoteButton" onclick="resetTimer()" disabled>Reset Timer</button>
	</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let peer;
let connection;
const remoteChannelId = "lystex-main-display";

function setStatus(message) {
	document.getElementById("status").textContent = message;
}

function setButtonsEnabled(enabled) {
	document.querySelectorAll(".remoteButton").forEach((button) => {
		button.disabled = !enabled;
	});
}

function buildPeer() {
	if (peer) {
		return peer;
	}

	peer = new Peer();
	peer.on("error", () => {
		setStatus("Connection failed.");
		setButtonsEnabled(false);
	});
	return peer;
}

function connectToPlayer() {
	setStatus("Connecting to display...");
	setButtonsEnabled(false);

	const activePeer = buildPeer();

	const openConnection = () => {
		if (connection) {
			connection.close();
		}

		connection = activePeer.connect(remoteChannelId, { reliable: true });

		connection.on("open", () => {
			setStatus("Connected to display.");
			setButtonsEnabled(true);
		});

		connection.on("close", () => {
			setStatus("Connection closed.");
			setButtonsEnabled(false);
		});

		connection.on("error", () => {
			setStatus("Connection failed.");
			setButtonsEnabled(false);
		});
	};

	if (activePeer.open) {
		openConnection();
		return;
	}

	activePeer.once("open", openConnection);
}

function sendCommand(videoName) {
	if (!connection || !connection.open) {
		setStatus("Connect to a display first.");
		setButtonsEnabled(false);
		return;
	}

	connection.send({ type: "play", video: videoName });
	setStatus(`Sent ${videoName.toUpperCase()} command.`);
}

function resetTimer() {
	if (!connection || !connection.open) {
		setStatus("Connect to a display first.");
		setButtonsEnabled(false);
		return;
	}

	connection.send({ type: "reset" });
	setStatus("Sent reset command.");
}

connectToPlayer();
</script>

</body>
</html>
