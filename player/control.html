<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Control Remote</title>
<style>
:root {
	--bg: #000000;
	--panel: rgba(14, 14, 14, 0.84);
	--panel-border: #db88c0;
	--ink: #f4d8e9;
	--muted: #d1a7c4;
	--accent-pink: #db88c0;
	--accent-lilac: #9f7fd2;
	--accent-cyan: #4fc4db;
	--shadow: rgba(219, 136, 192, 0.24);
}

body {
	margin: 0;
	min-height: 100vh;
	background: var(--bg);
	color: var(--ink);
	font-family: monospace;
	display: flex;
	align-items: center;
	justify-content: center;
}

.panel {
	width: min(520px, calc(100vw - 32px));
	border: 4px solid var(--panel-border);
	background: var(--panel);
	box-shadow: 0 20px 50px var(--shadow);
	padding: 24px;
}

h1 {
	margin: 0 0 8px;
	font-size: 1.8rem;
	letter-spacing: 2px;
	color: var(--ink);
}

p {
	margin: 0 0 18px;
	line-height: 1.5;
	color: var(--muted);
}

button {
	padding: 12px 16px;
	border: 1px solid rgba(63, 69, 70, 0.26);
	background: var(--accent-lilac);
	color: #f8f3e3;
	font: inherit;
	cursor: pointer;
	box-shadow: 0 10px 22px rgba(79, 83, 84, 0.18);
}

button:hover:enabled {
	filter: brightness(1.04);
}

button:disabled {
	opacity: 0.45;
	cursor: not-allowed;
}

.buttonGrid {
	display: grid;
	grid-template-columns: repeat(2, minmax(0, 1fr));
	gap: 12px;
}

#status {
	margin-bottom: 16px;
	min-height: 24px;
	color: var(--muted);
}

@media (max-width: 560px) {
	.buttonGrid {
		grid-template-columns: 1fr;
		display: grid;
	}
}
</style>
</head>
<body>

<div class="panel">
	<h1>Remote Playback</h1>
	<p>This controller connects automatically to the main display and uses the same four controls as the player.</p>

	<div id="status">Connecting to display...</div>

	<div class="buttonGrid">
		<button class="remoteButton" onclick="sendCommand('intro')" disabled>Control Intro</button>
		<button class="remoteButton" onclick="sendCommand('goodbye')" disabled>Control Goodbye</button>
		<button class="remoteButton" onclick="sendCommand('symbols')" disabled>Control Symbols</button>
		<button class="remoteButton" onclick="sendCommand('gate')" disabled>Control Gate</button>
		<button class="remoteButton" onclick="stopVideo()" disabled>Stop Video</button>
		<button class="remoteButton" onclick="resetTimer()" disabled>Reset Timer</button>
	</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
let peer;
let playerConnections = [];
const remoteChannelId = "lystex-main-controller";
const peerOptions = {
	host: "0.peerjs.com",
	secure: true,
	port: 443,
	path: "/"
};
let reconnectTimer;

function setStatus(message) {
	document.getElementById("status").textContent = message;
}

function setButtonsEnabled(enabled) {
	document.querySelectorAll(".remoteButton").forEach((button) => {
		button.disabled = !enabled;
	});
}

function updateConnectedStatus() {
	const activeConnections = playerConnections.filter((item) => item.open);
	const count = activeConnections.length;

	if (count === 0) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return;
	}

	setStatus(`Connected to ${count} player${count === 1 ? "" : "s"}.`);
	setButtonsEnabled(true);
}

function buildPeer() {
	if (peer) {
		return peer;
	}

	peer = new Peer(remoteChannelId, peerOptions);
	peer.on("open", () => {
		updateConnectedStatus();
	});
	peer.on("connection", (connection) => {
		playerConnections.push(connection);
		updateConnectedStatus();

		connection.on("open", () => {
			updateConnectedStatus();
		});

		connection.on("close", () => {
			playerConnections = playerConnections.filter((item) => item !== connection);
			updateConnectedStatus();
		});

		connection.on("error", () => {
			playerConnections = playerConnections.filter((item) => item !== connection);
			updateConnectedStatus();
		});
	});
	peer.on("disconnected", () => {
		setStatus("Reconnecting controller...");
		setButtonsEnabled(false);
		scheduleReconnect();
	});
	peer.on("error", () => {
		setStatus("Controller failed. Retrying...");
		setButtonsEnabled(false);
		scheduleReconnect();
	});
	return peer;
}

function scheduleReconnect() {
	window.clearTimeout(reconnectTimer);
	reconnectTimer = window.setTimeout(() => {
		playerConnections.forEach((connection) => {
			connection.close();
		});
		playerConnections = [];
		connectToPlayer();
	}, 1500);
}

function connectToPlayer() {
	setStatus("Starting controller...");
	setButtonsEnabled(false);
	buildPeer();
}

function broadcastCommand(command) {
	const activeConnections = playerConnections.filter((item) => item.open);

	if (activeConnections.length === 0) {
		setStatus("Waiting for players...");
		setButtonsEnabled(false);
		return false;
	}

	activeConnections.forEach((connection) => {
		connection.send(command);
	});

	updateConnectedStatus();
	return true;
}

function sendCommand(videoName) {
	if (!broadcastCommand({ type: "play", video: videoName })) {
		return;
	}

	setStatus(`Sent ${videoName.toUpperCase()} to all players.`);
}

function resetTimer() {
	if (!broadcastCommand({ type: "reset" })) {
		return;
	}

	setStatus("Sent reset to all players.");
}

function stopVideo() {
	if (!broadcastCommand({ type: "stop" })) {
		return;
	}

	setStatus("Sent stop to all players.");
}

connectToPlayer();
</script>

</body>
</html>
